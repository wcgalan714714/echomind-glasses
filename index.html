<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600, initial-scale=1.0">
    <title>EchoMind</title>
    <meta name="mrbd:title" content="EchoMind">
    <meta name="mrbd:description" content="Your Ambient Second Brain">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hud-container">
        <header class="header">
            <h1>EchoMind</h1>
            <div id="time" class="time"></div>
        </header>

        <div class="insight-panel" id="insight-panel"></div>

        <!-- Bottom right compact controls -->
        <div class="controls">
            <div class="capture-bar">
                <input type="text" id="quick-capture" placeholder="Quick note..." class="focusable">
                <button onclick="captureNote()" class="focusable">Save</button>
                <button onclick="startVoiceCapture()" class="focusable">🎤</button>
            </div>
            <button onclick="showHistory()" class="focusable">View All Notes</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
